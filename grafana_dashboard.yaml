apiVersion: v1
kind: ConfigMap
metadata:
  name: hami-native-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  hami-native-dashboard.json: |
    {
      "title": "HAMi GPU Split — Native Metrics",
      "uid": "hami-native-v3",
      "refresh": "5s",
      "time": {"from": "now-15m", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "VRAM Usage per Pod (real-time bytes)",
          "description": "vgpu-monitor: actual bytes each pod is using right now",
          "type": "timeseries",
          "gridPos": {"x":0,"y":0,"w":12,"h":8},
          "targets": [
            {"expr": "vGPU_device_memory_usage_in_bytes{zone='vGPU'}", "legendFormat": "used — {{podname}}"},
            {"expr": "vGPU_device_memory_limit_in_bytes{zone='vGPU'}", "legendFormat": "limit — {{podname}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "id": 2,
          "title": "VRAM Usage % of HAMi Limit per Pod",
          "type": "timeseries",
          "gridPos": {"x":12,"y":0,"w":12,"h":8},
          "targets": [{
            "expr": "vGPU_device_memory_usage_in_bytes{zone='vGPU'} / vGPU_device_memory_limit_in_bytes{zone='vGPU'} * 100",
            "legendFormat": "{{podname}}"
          }],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}}
        },
        {
          "id": 3,
          "title": "GPU Core Utilization per Pod (real-time %)",
          "description": "Device_utilization_desc_of_container from vgpu-monitor",
          "type": "timeseries",
          "gridPos": {"x":0,"y":8,"w":12,"h":8},
          "targets": [{
            "expr": "Device_utilization_desc_of_container{zone='vGPU'}",
            "legendFormat": "{{podname}}"
          }],
          "fieldConfig": {"defaults": {"unit": "percent"}}
        },
        {
          "id": 4,
          "title": "Physical GPU Utilization & VRAM (host view)",
          "description": "HostCoreUtilization and HostGPUMemoryUsage — full GPU as seen by nvidia-smi",
          "type": "timeseries",
          "gridPos": {"x":12,"y":8,"w":12,"h":8},
          "targets": [
            {"expr": "HostCoreUtilization{zone='vGPU'}", "legendFormat": "SM util % — GPU {{deviceidx}}"},
            {"expr": "HostGPUMemoryUsage{zone='vGPU'} / 1073741824", "legendFormat": "VRAM GB — GPU {{deviceidx}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 5,
          "title": "HAMi Allocated Cores per Pod (scheduler view)",
          "description": "vGPUCoreAllocated — what the scheduler assigned, stays flat",
          "type": "timeseries",
          "gridPos": {"x":0,"y":16,"w":12,"h":8},
          "targets": [{
            "expr": "vGPUCoreAllocated{zone='vGPU'}",
            "legendFormat": "{{podname}}"
          }],
          "fieldConfig": {"defaults": {"unit": "percent"}}
        },
        {
          "id": 6,
          "title": "HAMi Allocated VRAM per Pod (scheduler view)",
          "description": "vGPUMemoryAllocated — committed bytes per pod from scheduler",
          "type": "timeseries",
          "gridPos": {"x":12,"y":16,"w":12,"h":8},
          "targets": [{
            "expr": "vGPUMemoryAllocated{zone='vGPU'}",
            "legendFormat": "{{podname}}"
          }],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "id": 7,
          "title": "GPU Containers Sharing This GPU",
          "type": "stat",
          "gridPos": {"x":0,"y":24,"w":6,"h":5},
          "targets": [{
            "expr": "GPUDeviceSharedNum{zone='vGPU'}",
            "legendFormat": "containers"
          }],
          "fieldConfig": {"defaults": {"thresholds": {"steps": [
            {"color": "green", "value": 0},
            {"color": "yellow", "value": 3},
            {"color": "red", "value": 7}
          ]}}}
        },
        {
          "id": 8,
          "title": "Total Cores Allocated (of 100%)",
          "type": "gauge",
          "gridPos": {"x":6,"y":24,"w":6,"h":5},
          "targets": [{
            "expr": "GPUDeviceCoreAllocated{zone='vGPU'}"
          }],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100,
            "thresholds": {"steps": [
              {"color": "green", "value": 0},
              {"color": "yellow", "value": 70},
              {"color": "red", "value": 90}
            ]}
          }}
        },
        {
          "id": 9,
          "title": "Total VRAM Allocated (of GPU total)",
          "type": "gauge",
          "gridPos": {"x":12,"y":24,"w":6,"h":5},
          "targets": [{
            "expr": "GPUDeviceMemoryAllocated{zone='vGPU'} / GPUDeviceMemoryLimit{zone='vGPU'} * 100"
          }],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100,
            "thresholds": {"steps": [
              {"color": "green", "value": 0},
              {"color": "yellow", "value": 60},
              {"color": "red", "value": 85}
            ]}
          }}
        },
        {
          "id": 10,
          "title": "Namespace GPU Quota Usage",
          "description": "QuotaUsed — total gpumem and gpucores consumed in default namespace",
          "type": "stat",
          "gridPos": {"x":18,"y":24,"w":6,"h":5},
          "targets": [
            {"expr": "QuotaUsed{quotaName='nvidia.com/gpucores',zone='vGPU'}", "legendFormat": "cores used"},
            {"expr": "QuotaUsed{quotaName='nvidia.com/gpumem',zone='vGPU'}", "legendFormat": "mem MB used"}
          ],
          "fieldConfig": {"defaults": {}}
        }
      ],
      "schemaVersion": 38,
      "version": 1
    }
